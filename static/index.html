<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Không gian trò chuyện với AI GO Agent trên máy của bạn."
    />
    <meta name="theme-color" content="#0f172a" />
    <script>
      try {
        const savedTheme = localStorage.getItem("ai-go-theme")
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches
        document.documentElement.dataset.theme = savedTheme || (prefersDark ? "dark" : "light")
      } catch {
        document.documentElement.dataset.theme = "dark"
      }
    </script>
    <title>AI GO Workspace</title>
    <script type="module" crossorigin src="./assets/index-CqBaBiQ-.js"></script>

  </body>
