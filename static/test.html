<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello from Go</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 2rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
    }

    button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #2563eb;
    }

    #message {
      margin-top: 1rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello, World! 👋</h1>
    <p>This page is being served by a Go server.</p>

    <button id="btn">Click Me</button>

    <p id="message"></p>
  </div>

  <script>
    const messages = [
      "Go is awesome!",
      "Hello from JavaScript!",
      "Have a great day!",
      "Static files are working 🎉",
      "You clicked the button!"
    ];

    document.getElementById("btn").addEventListener("click", () => {
      const msg = messages[Math.floor(Math.random() * messages.length)];
      document.getElementById("message").textContent = msg;
    });
  </script>
</body>
</html>
